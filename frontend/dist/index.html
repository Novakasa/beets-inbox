<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>beets-inbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: #f5f5f5;
      color: #222;
    }

    /* ── Nav ── */
    .app-nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      background: #1a1a2e;
      color: #fff;
    }
    .app-title { font-size: 1.1rem; font-weight: 600; flex: 1; }
    .nav-links { display: flex; gap: 0.5rem; }
    .nav-btn {
      background: transparent;
      border: 1px solid transparent;
      color: #ccc;
      padding: 0.4rem 0.9rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .nav-btn.active { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.3); }

    /* ── Layout ── */
    .page-content { max-width: 900px; margin: 0 auto; padding: 1.5rem; }

    /* ── Buttons ── */
    .btn {
      padding: 0.4rem 0.9rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn:hover { background: #f0f0f0; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
    .btn-danger { background: #dc2626; color: #fff; border-color: #dc2626; }
    .btn-danger:hover:not(:disabled) { background: #b91c1c; }

    /* ── Form controls ── */
    .select {
      padding: 0.4rem 0.6rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      font-size: 0.9rem;
    }
    .field { display: flex; flex-direction: column; gap: 0.2rem; }
    .field-label { font-size: 0.8rem; color: #666; font-weight: 500; }
    .field-input {
      padding: 0.35rem 0.6rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
      width: 100%;
    }
    .field-input:focus { outline: none; border-color: #2563eb; }

    /* ── Status / messages ── */
    .loading { color: #666; padding: 1rem 0; }
    .empty-msg { color: #888; padding: 1rem 0; }
    .error-msg { color: #dc2626; padding: 0.5rem 0; }

    /* ── Upload section ── */
    .upload-section {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
    }
    .upload-section h2 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.75rem; color: #444; }
    .upload-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .filter-label { color: #666; font-size: 0.9rem; }

    /* ── Category group ── */
    .category-group { margin-bottom: 1.5rem; }
    .category-heading {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 0.5rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid #e5e5e5;
    }

    /* ── Item row ── */
    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 5px;
      margin-bottom: 0.5rem;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-name { display: block; font-weight: 500; margin-bottom: 0.2rem; word-break: break-all; }
    .tag-summary { font-size: 0.82rem; color: #888; }
    .tag-summary.empty { font-style: italic; }
    .item-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }

    /* ── Autotag checkbox ── */
    .autotag-label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.88rem; color: #555; cursor: pointer; white-space: nowrap; }
    .autotag-label input { cursor: pointer; }

    /* ── Cataloging state ── */
    .item-row--cataloging { opacity: 0.7; }
    .cataloging-msg { font-size: 0.82rem; color: #2563eb; font-style: italic; }

    /* ── Edit form ── */
    .item-edit {
      padding: 1rem 1.25rem;
      background: #fff;
      border: 2px solid #2563eb;
      border-radius: 5px;
      margin-bottom: 0.5rem;
    }
    .item-edit .item-name { font-weight: 500; margin-bottom: 0.75rem; color: #444; }
    .edit-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }
    .sidecar-info { font-size: 0.82rem; color: #666; margin-bottom: 0.75rem; }
    .sidecar-info dt { display: inline; font-weight: 600; }
    .sidecar-info dd { display: inline; margin-left: 0.25rem; margin-right: 1rem; }
    .sidecar-info a { color: #2563eb; }
    .edit-actions { display: flex; gap: 0.5rem; }

    /* ── Track list ── */
    .track-list {
      list-style: none;
      margin: 0.4rem 0 0 0;
      padding: 0;
      border-top: 1px solid #f0f0f0;
    }
    .track-item {
      display: flex;
      gap: 0.5rem;
      padding: 0.2rem 0;
      font-size: 0.82rem;
      color: #555;
      border-bottom: 1px solid #f5f5f5;
    }
    .track-item:last-child { border-bottom: none; }
    .track-num { color: #aaa; min-width: 1.8rem; text-align: right; flex-shrink: 0; }
    .track-title { flex: 1; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="main.js"></script>
  <script>
    var app = Elm.Main.init({ node: document.getElementById('app') });
  </script>
</body>
</html>
